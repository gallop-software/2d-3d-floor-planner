<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cabinet CAD — 3D + CNC Cut Sheets</title>
<meta name="description" content="Cabinet CAD: a 3D drawing plus CNC-ready DXF cut sheets and G-code for each board, generated from one cabinet definition.">
<link rel="canonical" href="https://2d-3d-floor-planner.gallop.software/cad/">

<!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) — same featured image as the home page -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://2d-3d-floor-planner.gallop.software/cad/">
<meta property="og:title" content="Cabinet CAD — 3D + CNC Cut Sheets">
<meta property="og:description" content="Cabinet CAD: a 3D drawing plus CNC-ready DXF cut sheets and G-code for each board, generated from one cabinet definition.">
<meta property="og:image" content="https://2d-3d-floor-planner.gallop.software/screenshot.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Cabinet CAD — 3D + CNC Cut Sheets">
<meta name="twitter:description" content="Cabinet CAD: a 3D drawing plus CNC-ready DXF cut sheets and G-code for each board, generated from one cabinet definition.">
<meta name="twitter:image" content="https://2d-3d-floor-planner.gallop.software/screenshot.jpg">
</head>
<body>
<div id="app">
  <header>
    <div class="menu" id="menu">
      <button class="btn icon" id="menuBtn" aria-label="Open page menu" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
      </button>
      <div class="menu-list" id="menuList" hidden></div>
    </div>
    <h1>Cabinet CAD</h1>
    <div class="page-nav">
      Cabinet
      <button class="btn" id="prev" title="Previous sheet">Prev</button>
      <select id="page" title="Pick a cabinet"></select>
      <button class="btn" id="next" title="Next sheet">Next</button>
    </div>
    <button class="btn" id="fit">Fit</button>
    <button class="btn dl" id="dl" hidden title="Download this sheet's cut file for the CNC">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v8M4.5 6.5 8 10l3.5-3.5M2.5 13.5h11"/></svg>
      <span id="dlLabel">Download DXF</span>
    </button>
    <button class="btn info" id="info" aria-label="Sheet info">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M8 7.4v3.4M8 5v.1"/></svg>
    </button>
    <span id="status"></span>
    <span class="spacer"></span>
    <div id="legend"></div>
  </header>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="readout">—</div>
    <label class="explode" id="explodeWrap" hidden>Explode
      <input type="range" id="explode" min="0" max="100" value="0">
    </label>
    <div id="drop">Drop .dxf to load</div>
  </div>
  <nav id="tabs" aria-label="Cabinet sheets"></nav>
</div>
<script type="module" src="./main.ts"></script>
</body>
</html>
